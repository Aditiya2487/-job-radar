name: job-radar

on:
  schedule:
    # GitHub cron is UTC. 03:30 + 12:30 UTC = 9:00 AM + 6:00 PM IST.
    - cron: "30 3,12 * * *"
  workflow_dispatch: {}   # lets you trigger a sweep manually from the Actions tab

permissions:
  contents: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependency
        run: pip install requests python-jobspy

      - name: Run sweep
        env:
          DASHBOARD_OUT: index.html
        run: python job_scraper.py

      - name: Commit updated dashboard
        run: |
          git config user.name "job-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html seen_jobs.json
          git diff --cached --quiet || git commit -m "sweep $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
